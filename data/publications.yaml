- title: 'ALBERT: An automatic learning based execution and resource management system for optimizing Hadoop workload in clouds'
  authorList:
    - name: 'Chen-Chun Chen'
      type: 'First Author'
    - name: 'Kai-Siang Wang'
      type: 'Co'
    - name: 'Yu-Tung Hsiao'
      type: 'Co'
    - name: 'Jerry Chou'
      type: 'Advisor'
  venue:
    name: 'Journal of Parallel and Distributed Computing'
    short: "JPDC'22"
  url: 'https://www.sciencedirect.com/science/article/pii/S0743731522001289'
  abstract: >
    Hadoop is a popular computing framework designed to deliver timely and cost-effective data processing
    on a large cluster of commodity machines. It relieves the burden of the programmers dealing with distributed
    programming, and an ecosystem of Big Data solutions has developed around it. However, Hadoop’s job
    execution time can greatly depend on its runtime configurations and resource selections. Given the more
    than 100 job configuration settings provided by Hadoop, and diverse resource instance options in a cloud or
    virtualized computing environment, running Hadoop jobs still requires a substantial amount of expertise
    and experience. To address this challenge, we apply a deep neural network to predict Hadoop’s job time based
    on historical execution data, and propose optimization methods to reduce job execution time and cost. The
    results show that our prediction method achieves almost 90% time prediction accuracy and clearly outperforms
    three other state-of-the-art regression-based prediction methods. Based on the time prediction, our proposed
    configuration search method and job scheduling algorithm successfully shorten the execution time of a single
    Hadoop job by more than a factor of 2 and reduce the time of processing a batch of Hadoop jobs by 40%–65%.
  image: '/images/hadoop.webp'
  bib: |
    @article{CHEN202245,
      title = {ALBERT: An automatic learning based execution and resource management system for optimizing Hadoop workload in clouds},
      journal = {Journal of Parallel and Distributed Computing},
      volume = {168},
      pages = {45-56},
      year = {2022},
      issn = {0743-7315},
      doi = {https://doi.org/10.1016/j.jpdc.2022.05.013},
      author = {Chen-Chun Chen and Kai-Siang Wang and Yu-Tung Hsiao and Jerry Chou},
    }
  date: '6/1/2022'
